<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>APJ Cabs – Get Your Quote</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f5f7fa;
      color: #333;
      padding: 16px;
    }
    .header {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      color: #f5a623;
      text-align: center;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 16px;
    }
    .header h2 { font-size: 1.2rem; }
    .header p { font-size: 0.8rem; color: #ccc; margin-top: 4px; }
    .card {
      background: white;
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    label {
      font-size: 0.8rem;
      font-weight: 600;
      color: #555;
      display: block;
      margin-bottom: 4px;
    }
    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 12px;
      background: #fafafa;
    }
    .fare-box {
      background: #fff8e7;
      border: 1px solid #f5a623;
      border-radius: 10px;
      padding: 14px;
      text-align: center;
      margin-bottom: 14px;
      display: none;
    }
    .fare-box .amount {
      font-size: 1.6rem;
      font-weight: bold;
      color: #e67e00;
    }
    .fare-box .label { font-size: 0.75rem; color: #888; }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
    }
    .btn-primary { background: #f5a623; color: white; }
    .btn-agent { background: #1a1a2e; color: white; display: none; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .status-msg {
      text-align: center;
      font-size: 0.82rem;
      color: #27ae60;
      margin-top: 6px;
      display: none;
    }
    .error-msg {
      text-align: center;
      font-size: 0.82rem;
      color: #e74c3c;
      margin-top: 6px;
      display: none;
    }
  </style>
</head>
<body>

<div class="header">
  <h2>🚖 APJ Cabs</h2>
  <p>Instant Fare Calculator</p>
</div>

<div class="card">
  <label>Your Name</label>
  <input type="text" id="custName" placeholder="Enter your name" />

  <label>Mobile Number</label>
  <input type="tel" id="custPhone" placeholder="+91 XXXXXXXXXX" />

  <label>Pickup Location</label>
  <input type="text" id="pickup" placeholder="e.g. Chennai Central" />

  <label>Drop Location</label>
  <input type="text" id="drop" placeholder="e.g. Chennai Airport" />

  <label>Journey Date</label>
  <input type="date" id="journeyDate" />

  <label>Journey Type</label>
  <select id="journeyType">
    <option value="">Select type</option>
    <option value="LOCAL">Local</option>
    <option value="OUTSTATION">Outstation</option>
    <option value="AIRPORT">Airport Transfer</option>
  </select>

  <label>Vehicle Type</label>
  <select id="vehicleType">
    <option value="">Select vehicle</option>
    <option value="SEDAN">Sedan (Dzire/Etios)</option>
    <option value="SUV">SUV (Innova/Ertiga)</option>
    <option value="LUXURY">Luxury (Innova Crysta)</option>
    <option value="TEMPO">Tempo Traveller</option>
  </select>

  <label>Approx Distance (KM)</label>
  <input type="number" id="distance" placeholder="e.g. 45" min="1" />

  <button class="btn btn-primary" onclick="calculateFare()">Calculate Fare</button>
</div>

<div class="fare-box" id="fareBox">
  <div class="label">Estimated Fare</div>
  <div class="amount" id="fareAmount">₹0</div>
  <div class="label" id="fareBreakdown"></div>
</div>

<button class="btn btn-agent" id="talkAgentBtn" onclick="talkToAgent()">
  🧑‍💼 Talk to Agent & Confirm Booking
</button>

<div class="status-msg" id="statusMsg">✅ Booking request sent! An agent will reach you shortly.</div>
<div class="error-msg" id="errorMsg">❌ Could not send. Please try again.</div>

<script>
  const BACKEND_URL = 'https://apjcabs-bridge.onrender.com';

  // Capture conversation_id passed from Freshchat widget via URL param
  const urlParams = new URLSearchParams(window.location.search);
  const conversationId = urlParams.get('conversation_id') || '';

  const TARIFF = {
    LOCAL:      { SEDAN: 14, SUV: 18, LUXURY: 22, TEMPO: 28 },
    OUTSTATION: { SEDAN: 12, SUV: 16, LUXURY: 20, TEMPO: 26 },
    AIRPORT:    { SEDAN: 350, SUV: 500, LUXURY: 700, TEMPO: 1200 }
  };

  let calculatedFare = 0;

  function calculateFare() {
    const type = document.getElementById('journeyType').value;
    const vehicle = document.getElementById('vehicleType').value;
    const dist = parseFloat(document.getElementById('distance').value) || 0;

    if (!type || !vehicle || dist <= 0) {
      alert('Please fill Journey Type, Vehicle Type and Distance.');
      return;
    }

    const rate = TARIFF[type][vehicle];
    if (type === 'AIRPORT') {
      calculatedFare = rate;
    } else {
      calculatedFare = rate * dist;
    }

    document.getElementById('fareAmount').textContent = '₹' + calculatedFare.toLocaleString('en-IN');
    document.getElementById('fareBreakdown').textContent =
      type === 'AIRPORT'
        ? `Flat rate for ${vehicle}`
        : `₹${rate}/km × ${dist} km`;

    document.getElementById('fareBox').style.display = 'block';
    document.getElementById('talkAgentBtn').style.display = 'block';
  }

  async function talkToAgent() {
    const name     = document.getElementById('custName').value.trim();
    const phone    = document.getElementById('custPhone').value.trim();
    const pickup   = document.getElementById('pickup').value.trim();
    const drop     = document.getElementById('drop').value.trim();
    const date     = document.getElementById('journeyDate').value;
    const type     = document.getElementById('journeyType').value;
    const vehicle  = document.getElementById('vehicleType').value;
    const dist     = document.getElementById('distance').value;

    if (!name || !phone || !pickup || !drop) {
      alert('Please fill your Name, Phone, Pickup and Drop location.');
      return;
    }

    const summary = `
🚖 NEW BOOKING REQUEST — APJ CABS
━━━━━━━━━━━━━━━━━━━━━━━━
👤 Customer : ${name}
📞 Mobile   : ${phone}
📍 Pickup   : ${pickup}
📍 Drop     : ${drop}
📅 Date     : ${date || 'Not specified'}
🚗 Vehicle  : ${vehicle}
🛣️ Type     : ${type}
📏 Distance : ${dist} KM
💰 Est. Fare: ₹${calculatedFare.toLocaleString('en-IN')}
━━━━━━━━━━━━━━━━━━━━━━━━
Please confirm and contact the customer.
    `.trim();

    const btn = document.getElementById('talkAgentBtn');
    btn.disabled = true;
    btn.textContent = 'Sending...';

    try {
      const res = await fetch(`${BACKEND_URL}/send-summary`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ conversation_id: conversationId, summary })
      });

      const data = await res.json();
      if (res.ok && data.success) {
        document.getElementById('statusMsg').style.display = 'block';
        btn.textContent = '✅ Request Sent!';
      } else {
        throw new Error(JSON.stringify(data));
      }
    } catch (e) {
      console.error(e);
      document.getElementById('errorMsg').style.display = 'block';
      btn.disabled = false;
      btn.textContent = '🧑‍💼 Talk to Agent & Confirm Booking';
    }
  }
</script>
</body>
</html>
